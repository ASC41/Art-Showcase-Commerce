kind = "web"
previewPath = "/"
title = "Ryan Cellar — Artist"
version = "1.0.0"
id = "artifacts/artist-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18258

[services.development]
run = "pnpm --filter @workspace/artist-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/artist-website", "run", "build" ]
publicDir = "artifacts/artist-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18258"
BASE_PATH = "/"
